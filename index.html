<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Jattau — Мобильное приложение</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1B6B4A;
      --primary-light: #4CAF7A;
      --secondary: #C9A227;
      --surface: #FAFAF8;
      --text: #1C1B1F;
      --text-muted: #5C5C62;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(27, 107, 74, 0.18), transparent),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(201, 162, 39, 0.12), transparent),
        var(--surface);
      z-index: -1;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 24px;
      padding: 48px 32px 40px;
      text-align: center;
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.04),
        0 12px 40px rgba(27, 107, 74, 0.08);
      border: 1px solid rgba(27, 107, 74, 0.08);
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      background: linear-gradient(145deg, var(--primary), var(--primary-light));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(27, 107, 74, 0.25);
    }

    .logo svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }

    .brand-ar {
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .brand-en {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .phone-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(27, 107, 74, 0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-wrap svg {
      width: 40px;
      height: 40px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 12px;
      color: var(--text);
    }

    p {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 2px;
      margin: 28px auto;
    }

    .stores {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .store-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 12px;
      background: rgba(27, 107, 74, 0.06);
      border: 1px solid rgba(27, 107, 74, 0.12);
      color: var(--primary);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .store-badge:hover {
      background: rgba(27, 107, 74, 0.1);
      border-color: rgba(27, 107, 74, 0.2);
    }

    .store-badge svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .api-note {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      font-size: 0.75rem;
      color: #9E9E9E;
    }

    .api-note a {
      color: var(--primary);
      text-decoration: none;
    }

    .api-note a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 24px 32px;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <main class="card">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 6v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V6l-8-4zm0 2.18l6 3v5.82c0 4.52-3.13 8.78-6 9.93-2.87-1.15-6-5.41-6-9.93V7.18l6-3z"/>
        <path d="M12 7c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
      </svg>
    </div>

    <p class="brand-ar" dir="rtl">جَتَّوْ</p>
    <p class="brand-en">Jattau</p>
    <p class="tagline">AI-powered Quran learning</p>

    <div class="phone-wrap" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
        <line x1="12" y1="18" x2="12.01" y2="18"/>
      </svg>
    </div>

    <h1>Сервис доступен только через мобильное приложение</h1>
    <p>Установите Jattau на смартфон, чтобы изучать Коран с проверкой произношения и ИИ-наставником.</p>

    <div class="divider"></div>

    <div class="stores">
      <span class="store-badge">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        App Store — скоро
      </span>
      <span class="store-badge">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a1.003 1.003 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.198l2.807 1.626a1 1 0 0 1 0 1.73l-2.808 1.626L15.206 12l2.492-2.491zM5.864 2.658L16.8 8.99l-2.302 2.302-8.634-8.634z"/></svg>
        Google Play — скоро
      </span>
    </div>

    <p class="api-note">
      API для разработчиков:
      <a href="api/docs">документация</a>
    </p>
  </main>
</body>
</html>
